<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>結案進度 Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
.page{display:none;min-height:100vh}
.page.active{display:block}
header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;position:sticky;top:0;z-index:10}
.header-row{display:flex;align-items:center;gap:10px}
.back-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px}
.back-btn:hover{background:#30363d;color:#e6edf3}
h1{font-size:16px;font-weight:600;color:#e6edf3;flex:1}
.subtitle{font-size:12px;color:#8b949e;margin-top:2px}
.container{padding:12px}
/* Rep cards */
.rep-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s}
.rep-card:hover{border-color:#58a6ff;background:#1a2332}
.rep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rep-name{font-size:15px;font-weight:600}
.rep-rate{font-size:13px;font-weight:600;padding:2px 8px;border-radius:12px}
.rate-high{background:#1a4228;color:#3fb950}
.rate-mid{background:#3d2c00;color:#d29922}
.rate-low{background:#3d1a1a;color:#f85149}
.progress-bar{background:#21262d;border-radius:3px;height:6px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.fill-high{background:#3fb950}
.fill-mid{background:#d29922}
.fill-low{background:#f85149}
.fill-over{background:#58a6ff}
.rep-stats{display:flex;justify-content:space-between;font-size:11px;color:#8b949e}
.rep-meta{font-size:11px;color:#8b949e;margin-top:4px}
/* Summary bar at top */
.summary-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:14px}
.summary-title{font-size:12px;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.summary-row{display:flex;justify-content:space-between;margin-bottom:4px}
.summary-label{font-size:12px;color:#8b949e}
.summary-val{font-size:12px;color:#e6edf3;font-weight:600}
/* Activity cards */
.activity-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s}
.activity-card:hover{border-color:#58a6ff;background:#1a2332}
.activity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.activity-name{font-size:15px;font-weight:600}
.activity-count{font-size:11px;color:#8b949e;background:#21262d;padding:2px 8px;border-radius:10px}
/* Store list */
.store-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s}
.store-card:hover{border-color:#58a6ff;background:#1a2332}
.store-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.store-name{font-size:14px;font-weight:600}
.store-plan{font-size:11px;color:#8b949e;background:#21262d;padding:1px 6px;border-radius:8px;margin-left:6px}
.store-rate{font-size:12px;font-weight:600;padding:2px 7px;border-radius:10px}
.store-stats{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;margin-top:4px}
/* Detail page */
.detail-section{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px}
.section-title{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.month-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #21262d}
.month-row:last-child{border-bottom:none}
.month-label{font-size:12px;color:#8b949e;min-width:24px}
.month-items{flex:1;margin-left:10px}
.month-item{font-size:12px;color:#e6edf3;margin-bottom:2px}
.month-amount{font-size:12px;color:#58a6ff;font-weight:600;min-width:70px;text-align:right}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:13px;color:#8b949e}
.stat-val{font-size:13px;color:#e6edf3;font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-green{background:#1a4228;color:#3fb950}
.badge-red{background:#3d1a1a;color:#f85149}
.badge-blue{background:#0d2d6e;color:#58a6ff}
.badge-orange{background:#3d2c00;color:#d29922}
.badge-grey{background:#21262d;color:#8b949e}
.chevron{color:#8b949e;font-size:14px}
.rank{font-size:11px;color:#8b949e;min-width:18px}
.empty-state{text-align:center;padding:40px 20px;color:#8b949e;font-size:13px}
.tag-spec{background:#0d2d6e;color:#58a6ff;border:1px solid #1f4a9e;font-size:10px;padding:1px 6px;border-radius:6px}
.tag-flex{background:#1a3d1a;color:#3fb950;border:1px solid #2a5c2a;font-size:10px;padding:1px 6px;border-radius:6px}
.tag-big{background:#3d1e00;color:#e67a1a;border:1px solid #5c3200;font-size:10px;padding:1px 6px;border-radius:6px}
</style>
</head>

let currentRep = null;
let currentActivity = null;

// ── helpers ──────────────────────────────────────────────────────────────────
function fmt(n){return n==null?'–':Math.round(n).toLocaleString('zh-TW')}
function pct(r){return r==null?'–':(r*100).toFixed(1)+'%'}
function rateClass(r){return r>=1?'rate-high':r>=0.6?'rate-mid':'rate-low'}
function fillClass(r){return r>=1?'fill-over':r>=0.6?'fill-high':r>=0.3?'fill-mid':'fill-low'}
function fillW(r){return Math.min(r*100,100)+'%'}
function badgeClass(r){return r>=1?'badge-green':r>=0.6?'badge-orange':'badge-red'}

function goTo(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  window.scrollTo(0,0);
}

const REPS = ['Jerry','Emily','Eric','Jayden','Wei','Yi'];
const ACTIVITIES = ['年特案','彈性年約','大口活動'];
const ACTIVITY_TAGS = {'年特案':'tag-spec','彈性年約':'tag-flex','大口活動':'tag-big'};

// ── Rep aggregate ─────────────────────────────────────────────────────────────
function getRepStats(rep){
  let totalContract=0, totalActual=0, storeCounts={};
  ACTIVITIES.forEach(a=>storeCounts[a]=0);

  D.spec_stores.filter(s=>s.rep===rep).forEach(s=>{
    totalContract+=s.contract; totalActual+=s.actual; storeCounts['年特案']++;
  });
  D.flex_stores.filter(s=>s.rep===rep).forEach(s=>{
    totalContract+=s.contract; totalActual+=s.total; storeCounts['彈性年約']++;
  });
  D.big_mouth_stores.filter(s=>s.rep===rep).forEach(s=>{
    totalContract+=s.contract; totalActual+=s.actual; storeCounts['大口活動']++;
  });
  return {totalContract, totalActual, rate: totalContract?totalActual/totalContract:0, storeCounts};
}

// ── Grand total ───────────────────────────────────────────────────────────────
function getGrandTotal(){
  let tc=0, ta=0;
  D.spec_stores.forEach(s=>{tc+=s.contract;ta+=s.actual});
  D.flex_stores.forEach(s=>{tc+=s.contract;ta+=s.total});
  D.big_mouth_stores.forEach(s=>{tc+=s.contract;ta+=s.actual});
  return {tc,ta,rate:tc?ta/tc:0};
}

// ── Activity aggregate for rep ────────────────────────────────────────────────
function getActivityStats(rep, activity){
  let stores = [];
  if(activity==='年特案') stores = D.spec_stores.filter(s=>s.rep===rep);
  else if(activity==='彈性年約') stores = D.flex_stores.filter(s=>s.rep===rep);
  else stores = D.big_mouth_stores.filter(s=>s.rep===rep);
  let tc=0, ta=0;
  stores.forEach(s=>{tc+=s.contract; ta+=(s.actual||s.total||0);});
  return {tc,ta,rate:tc?ta/tc:0,count:stores.length};
}

// ── Page 1 render ─────────────────────────────────────────────────────────────
function renderP1(){
  const {tc,ta,rate} = getGrandTotal();
  let html = '<div class="summary-card">';
  html += '<div class="summary-title">全員總計 (三項活動)</div>';
  const fc = fillClass(rate);
  html += '<div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+fillW(rate)+'"></div></div>';
  html += '<div class="rep-stats"><span>合約 $'+fmt(tc)+'</span><span style="color:#e6edf3;font-weight:600">'+pct(rate)+'</span><span>進貨 $'+fmt(ta)+'</span></div>';
  html += '</div>';

  REPS.forEach(rep=>{
    const {totalContract,totalActual,rate,storeCounts} = getRepStats(rep);
    const fc = fillClass(rate);
    const rc = rateClass(rate);
    html += '<div class="rep-card" onclick="openRep(''+rep+'')">';
    html += '<div class="rep-header"><span class="rep-name">'+rep+'</span><span class="rep-rate '+rc+'">'+pct(rate)+'</span></div>';
    html += '<div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+fillW(rate)+'"></div></div>';
    html += '<div class="rep-stats"><span>合約 $'+fmt(totalContract)+'</span><span>進貨 $'+fmt(totalActual)+'</span></div>';
    let tagStr = ACTIVITIES.filter(a=>storeCounts[a]>0).map(a=>'<span class="'+ACTIVITY_TAGS[a]+'">'+a+' '+storeCounts[a]+'</span>').join(' ');
    html += '<div class="rep-meta" style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">'+tagStr+'</div>';
    html += '<div class="chevron" style="text-align:right;margin-top:4px">›</div>';
    html += '</div>';
  });

  document.getElementById('p1-content').innerHTML = html;
}

// ── Page 2 render ─────────────────────────────────────────────────────────────
function openRep(rep){
  currentRep = rep;
  document.getElementById('p2-title').textContent = rep + ' 的活動';
  document.getElementById('p2-subtitle').textContent = '點選活動查看店家列表';

  const {totalContract,totalActual,rate} = getRepStats(rep);
  let html = '<div class="summary-card">';
  html += '<div class="summary-title">'+rep+' 合計</div>';
  const fc = fillClass(rate);
  html += '<div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+fillW(rate)+'"></div></div>';
  html += '<div class="rep-stats"><span>合約 $'+fmt(totalContract)+'</span><span style="color:#e6edf3;font-weight:600">'+pct(rate)+'</span><span>進貨 $'+fmt(totalActual)+'</span></div>';
  html += '</div>';

  ACTIVITIES.forEach(activity=>{
    const {tc,ta,rate,count} = getActivityStats(rep, activity);
    if(count === 0) return;
    const fc = fillClass(rate);
    const rc = rateClass(rate);
    html += '<div class="activity-card" onclick="openActivity(''+activity+'')">';
    html += '<div class="activity-header">';
    html += '<span class="activity-name"><span class="'+ACTIVITY_TAGS[activity]+'" style="margin-right:6px">'+activity+'</span></span>';
    html += '<span class="activity-count">'+count+' 家</span>';
    html += '</div>';
    html += '<div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+fillW(rate)+'"></div></div>';
    html += '<div class="rep-stats"><span>合約 $'+fmt(tc)+'</span><span class="'+rc+'">'+pct(rate)+'</span><span>進貨 $'+fmt(ta)+'</span></div>';
    html += '<div class="chevron" style="text-align:right;margin-top:6px">›</div>';
    html += '</div>';
  });

  document.getElementById('p2-content').innerHTML = html;
  goTo(2);
}

// ── Page 3 render ─────────────────────────────────────────────────────────────
function openActivity(activity){
  currentActivity = activity;
  document.getElementById('p3-title').textContent = currentRep + ' · ' + activity;
  document.getElementById('p3-subtitle').textContent = '依合約金額排序 ↓';

  let stores = [];
  if(activity==='年特案'){
    stores = D.spec_stores.filter(s=>s.rep===currentRep).map(s=>({
      name:s.store, contract:s.contract, actual:s.actual, rate:s.rate,
      extra:'', clickable:true
    })).sort((a,b)=>b.contract-a.contract);
  } else if(activity==='彈性年約'){
    stores = D.flex_stores.filter(s=>s.rep===currentRep).map(s=>({
      name:s.store, contract:s.contract, actual:s.total, rate:s.rate,
      extra:'方案'+s.plan+(s.result_q2?' · Q2:'+s.result_q2:''), clickable:true,
      q1:s.q1, q2:s.q2, result_q1:s.result_q1, result_q2:s.result_q2, plan:s.plan
    })).sort((a,b)=>b.contract-a.contract);
  } else {
    stores = D.big_mouth_stores.filter(s=>s.rep===currentRep).map(s=>({
      name:s.store, contract:s.contract, actual:s.actual, rate:s.rate,
      extra:s.item, clickable:true, item:s.item
    })).sort((a,b)=>b.contract-a.contract);
  }

  let html = '';
  if(stores.length === 0){
    html = '<div class="empty-state">此業務無此活動的店家資料</div>';
  }
  stores.forEach((s,i)=>{
    const rc = rateClass(s.rate);
    const bc = badgeClass(s.rate);
    html += '<div class="store-card" onclick="openStore('+i+')">';
    html += '<div class="store-header">';
    html += '<span class="rank">'+(i+1)+'</span>';
    html += '<span class="store-name">'+s.name+'</span>';
    if(s.extra) html += '<span class="store-plan">'+s.extra+'</span>';
    html += '<span class="store-rate badge '+bc+'">'+pct(s.rate)+'</span>';
    html += '</div>';
    const fc = fillClass(s.rate);
    html += '<div class="progress-bar"><div class="progress-fill '+fc+'" style="width:'+fillW(s.rate)+'"></div></div>';
    html += '<div class="store-stats"><span>合約 $'+fmt(s.contract)+'</span><span>進貨 $'+fmt(s.actual)+'</span></div>';
    html += '</div>';
  });

  // Store in window for detail access
  window._storeList = stores;
  document.getElementById('p3-content').innerHTML = html;
  goTo(3);
}

// ── Page 4 render ─────────────────────────────────────────────────────────────
function openStore(idx){
  const s = window._storeList[idx];
  document.getElementById('p4-title').textContent = s.name;
  document.getElementById('p4-subtitle').textContent = currentRep + ' · ' + currentActivity;

  let html = '<div class="detail-section">';
  html += '<div class="section-title">概況</div>';
  const fc = fillClass(s.rate);
  html += '<div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill '+fc+'" style="width:'+fillW(s.rate)+'"></div></div>';
  html += '<div class="stat-row"><span class="stat-label">合約金額</span><span class="stat-val">$'+fmt(s.contract)+'</span></div>';
  html += '<div class="stat-row"><span class="stat-label">已進貨金額</span><span class="stat-val">$'+fmt(s.actual)+'</span></div>';
  html += '<div class="stat-row"><span class="stat-label">達成率</span><span class="stat-val"><span class="badge '+badgeClass(s.rate)+'">'+pct(s.rate)+'</span></span></div>';

  if(currentActivity==='彈性年約'){
    html += '<div class="stat-row"><span class="stat-label">方案</span><span class="stat-val">'+s.plan+'</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Q1進貨</span><span class="stat-val">$'+fmt(s.q1)+'</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Q2進貨</span><span class="stat-val">$'+fmt(s.q2)+'</span></div>';
    if(s.result_q1) html += '<div class="stat-row"><span class="stat-label">Q1結案</span><span class="stat-val">'+s.result_q1+'</span></div>';
    if(s.result_q2) html += '<div class="stat-row"><span class="stat-label">Q2結案</span><span class="stat-val">'+s.result_q2+'</span></div>';
  }

  if(currentActivity==='大口活動' && s.item){
    html += '<div class="stat-row"><span class="stat-label">品項</span><span class="stat-val">'+s.item+'</span></div>';
  }
  html += '</div>';

  // Monthly detail for 年特案
  if(currentActivity==='年特案'){
    const monthly = D.store_monthly[s.name];
    if(monthly){
      html += '<div class="detail-section">';
      html += '<div class="section-title">月度明細</div>';
      const months = [10,11,12,1,2,3];
      const mLabels = {10:'10月',11:'11月',12:'12月',1:'1月',2:'2月',3:'3月'};
      months.forEach(m=>{
        const items = monthly[String(m)];
        if(!items || items.length===0) return;
        const total = items.reduce((acc,i)=>acc+i.amount,0);
        html += '<div class="month-row">';
        html += '<span class="month-label">'+mLabels[m]+'</span>';
        html += '<div class="month-items">';
        items.forEach(item=>{
          html += '<div class="month-item">'+item.product+' × '+item.qty+'瓶</div>';
        });
        html += '</div>';
        html += '<span class="month-amount">$'+fmt(total)+'</span>';
        html += '</div>';
      });
      html += '</div>';
    }
  }

  document.getElementById('p4-content').innerHTML = html;
  goTo(4);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderP1();

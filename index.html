<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IMD Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --s1:#0d1220;
  --s2:#121a2e;
  --s3:#182237;
  --bd:#1e2d47;
  --bd2:#2a3f5c;
  --tx:#d8e8ff;
  --tx2:#4e6a8a;
  --tx3:#8aa4c0;
  --blue:#4f9eff;
  --blue-d:#102244;
  --green:#00d48a;
  --green-d:#00281a;
  --amber:#ffb033;
  --amber-d:#2d1c00;
  --red:#ff4f6a;
  --red-d:#2d0812;
  --mono:'DM Mono','Courier New',monospace;
  --sans:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
.nav{
  display:flex;background:var(--s1);
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:100;
  padding:0 4px;
}
.nav button{
  flex:1;padding:14px 4px 12px;background:none;border:none;
  color:var(--tx2);font-size:13px;font-family:var(--sans);
  cursor:pointer;position:relative;letter-spacing:.04em;
  transition:color .2s;
}
.nav button::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2px;background:var(--blue);border-radius:2px 2px 0 0;
  transform:scaleX(0);transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.nav button.active{color:var(--blue);}
.nav button.active::after{transform:scaleX(1);}

/* ── PAGES ── */
.page{display:none;padding:16px 14px 32px}
.page.active{display:block}

/* ── TYPOGRAPHY ── */
.pg-title{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:16px}
.back-btn{
  display:inline-flex;align-items:center;gap:5px;
  color:var(--blue);font-size:13px;cursor:pointer;
  border:none;background:none;padding:0;margin-bottom:16px;
  opacity:.8;transition:opacity .15s;
}
.back-btn:active{opacity:1}
.back-btn::before{content:'←';font-family:var(--mono)}

/* ── SUMMARY BOX ── */
.sum-box{
  background:linear-gradient(135deg,var(--s2) 0%,var(--s3) 100%);
  border:1px solid var(--bd2);border-radius:12px;
  padding:14px 16px 16px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.sum-box::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(79,158,255,.08) 0%,transparent 70%);
  pointer-events:none;
}
.sum-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);margin-bottom:12px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sum-item{background:var(--s1);border-radius:8px;padding:10px 12px}
.sum-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--blue);letter-spacing:-.01em}
.sum-lbl{font-size:10px;color:var(--tx2);margin-top:3px;letter-spacing:.06em}

/* ── PROGRESS BAR ── */
.bar-track{
  width:100%;height:5px;background:rgba(255,255,255,.06);
  border-radius:3px;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:3px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.bar-fill::after{
  content:'';position:absolute;top:0;left:-60px;width:60px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shimmer 2.4s infinite;
}
@keyframes shimmer{0%{left:-60px}100%{left:110%}}
.bar-fill.g{background:linear-gradient(90deg,#00a86e,var(--green))}
.bar-fill.w{background:linear-gradient(90deg,#c87000,var(--amber))}
.bar-fill.r{background:linear-gradient(90deg,#c02040,var(--red))}

/* ── CHIP / BADGE ── */
.chip{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-family:var(--mono);font-weight:500;
  padding:2px 7px;border-radius:20px;margin-left:6px;
  vertical-align:middle;
}
.chip::before{content:'•';font-size:8px}
.chip.g{background:var(--green-d);color:var(--green)}
.chip.w{background:var(--amber-d);color:var(--amber)}
.chip.r{background:var(--red-d);color:var(--red)}

/* ── REP / ACT CARD ── */
.card{
  background:var(--s1);
  border:1px solid var(--bd);
  border-left:3px solid var(--bd2);
  border-radius:10px;padding:14px 16px;
  margin-bottom:10px;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.card:active{background:var(--s2);border-left-color:var(--blue)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-size:15px;font-weight:600;color:var(--tx);letter-spacing:.01em}
.card-meta{font-size:11px;color:var(--tx2);margin-top:5px;line-height:1.6}
.card-meta b{color:var(--tx3);font-weight:400}
.card-rate-big{
  font-family:var(--mono);font-size:18px;font-weight:500;
  line-height:1;text-align:right;
}

/* ── STORE CARD ── */
.scard{
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;
  display:flex;gap:10px;align-items:center;
  transition:background .15s;
}
.scard:active{background:var(--s2)}
.rank{
  font-family:var(--mono);font-size:26px;font-weight:500;
  color:var(--bd2);min-width:32px;text-align:center;line-height:1;
}
.scard-body{flex:1;min-width:0}
.scard-name{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.scard-right{text-align:right;flex-shrink:0}
.scard-amt{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--blue)}
.scard-rem{font-size:10px;color:var(--tx2);margin-top:2px;font-family:var(--mono)}

/* ── DETAIL ── */
.det-box{
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:16px;margin-bottom:12px;
}
.det-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);margin-bottom:12px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.kv:last-child{border-bottom:none;padding-bottom:0}
.kv-k{color:var(--tx2)}
.kv-v{font-weight:600;color:var(--tx);font-family:var(--mono);font-size:13px}
.det-bar-wrap{margin-top:10px}
.det-bar-track{width:100%;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.det-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--tx2);margin-top:5px;font-family:var(--mono)}

.empty{text-align:center;padding:48px 16px;color:var(--tx2);font-size:14px}
</style>
</head>

</nav>

var REPS=["Jerry","Emily","Eric","Jayden","Wei","Yi"];
var ACTS=["\u5e74\u7279\u6848","\u5f48\u6027\u5e74\u7d04","\u5927\u53e3\u6d3b\u52d5"];
var curRep=-1,curAct=-1;

function fmt(n){if(n==null)return'-';var v=Math.round(n);return v>=1000000?'$'+(v/1000000).toFixed(2)+'M':'$'+v.toLocaleString();}
function fmtFull(n){return n==null?'-':'$'+Math.round(n).toLocaleString();}
function pct(r){return r==null?'-':(r*100).toFixed(1)+'%';}
function bc(r){return r>=0.55?'g':r>=0.2?'w':'r';}
function chipHtml(r){
  if(r==null)return'';
  var p=r*100,c=p>=55?'g':p>=20?'w':'r';
  return '<span class="chip '+c+'">'+p.toFixed(0)+'%</span>';
}
function barFill(r){
  var w=Math.min(100,Math.max(0,r*100)).toFixed(1);
  return '<div class="bar-fill '+bc(r)+'" style="width:'+w+'%"></div>';
}
function bar(r){return '<div class="bar-track" style="margin-top:10px">'+barFill(r)+'</div>';}

function showTab(t){
  document.querySelectorAll('.nav button').forEach(function(b,i){b.classList.toggle('active',i===t);});
  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===t);});
  if(t===0){curRep=-1;renderReps();}
  if(t===1)renderActs(curRep>=0?curRep:null);
}
function actStores(j,rep){
  var arr=j===0?D.spec_stores:j===1?D.flex_stores:D.big_mouth_stores;
  return rep!=null?arr.filter(function(s){return s.rep===rep;}):arr;
}
function totals(stores){
  var tc=stores.reduce(function(a,s){return a+s.contract;},0);
  var ta=stores.reduce(function(a,s){return a+s.actual;},0);
  return{tc:tc,ta:ta,rate:tc>0?ta/tc:0};
}

function sumBox(stores,label){
  var t=totals(stores);
  var c=bc(t.rate);
  var rateColor=c==='g'?'var(--green)':c==='w'?'var(--amber)':'var(--red)';
  return '<div class="sum-box">'
    +'<div class="sum-label">'+label+' &nbsp;·&nbsp; '+stores.length+' \u5bb6\u5e97</div>'
    +'<div class="sum-grid">'
    +'<div class="sum-item"><div class="sum-val">'+fmt(t.tc)+'</div><div class="sum-lbl">\u5408\u7d04\u7e3d\u984d</div></div>'
    +'<div class="sum-item"><div class="sum-val">'+fmt(t.ta)+'</div><div class="sum-lbl">\u5be6\u969b\u9032\u8ca8</div></div>'
    +'<div class="sum-item" style="grid-column:1/-1"><div class="sum-val" style="font-size:22px;color:'+rateColor+'">'+pct(t.rate)+'</div><div class="sum-lbl">\u6574\u9ad4\u9054\u6210\u7387</div></div>'
    +'</div>'
    +'<div class="bar-track">'+barFill(t.rate)+'</div>'
    +'</div>';
}

// ── Page 0: Rep list ──────────────────────────────────────────────
function renderReps(){
  var allS=D.spec_stores.concat(D.flex_stores).concat(D.big_mouth_stores);
  var h='<div class="pg-title">\u696d\u52d9\u7e3d\u89bd</div>';
  h+=sumBox(allS,'\u5168\u90e8\u6d3b\u52d5');
  REPS.forEach(function(rep,i){
    var rs=allS.filter(function(s){return s.rep===rep;});
    var t=totals(rs);
    var c=bc(t.rate);
    var lc=c==='g'?'var(--green)':c==='w'?'var(--amber)':'var(--red)';
    h+='<div class="card" onclick="openRep('+i+')" style="border-left-color:'+lc+'">';
    h+='<div class="card-top">';
    h+='<div><div class="card-name">'+rep+'</div>';
    h+='<div class="card-meta"><b>\u5408\u7d04</b> '+fmt(t.tc)+'&nbsp;&nbsp;<b>\u9054\u6210</b> '+fmt(t.ta)+'</div></div>';
    h+='<div class="card-rate-big" style="color:'+lc+'">'+pct(t.rate)+'</div>';
    h+='</div>';
    h+=bar(t.rate);
    h+='</div>';
  });
  document.getElementById('p0').innerHTML=h;
}

function openRep(i){
  curRep=i;
  document.querySelectorAll('.nav button').forEach(function(b,j){b.classList.toggle('active',j===1);});
  document.querySelectorAll('.page').forEach(function(p,j){p.classList.toggle('active',j===1);});
  renderActs(i);
}

// ── Page 1: Act list ──────────────────────────────────────────────
function renderActs(repIdx){
  var rep=repIdx!=null&&repIdx>=0?REPS[repIdx]:null;
  var h='';
  if(rep){
    h+='<button class="back-btn" onclick="backToReps()">\u8fd4\u56de\u696d\u52d9</button>';
    h+='<div class="pg-title">'+rep+' \u7684\u6d3b\u52d5</div>';
  } else {
    h+='<div class="pg-title">\u6d3b\u52d5\u6982\u89bd</div>';
  }
  var allRepS=rep
    ?D.spec_stores.concat(D.flex_stores).concat(D.big_mouth_stores).filter(function(s){return s.rep===rep;})
    :D.spec_stores.concat(D.flex_stores).concat(D.big_mouth_stores);
  h+=sumBox(allRepS, rep?rep+' \u5168\u6d3b\u52d5':'\u6240\u6709\u696d\u52d9');
  ACTS.forEach(function(act,j){
    var stores=actStores(j,rep);
    var t=totals(stores);
    var c=bc(t.rate);
    var lc=c==='g'?'var(--green)':c==='w'?'var(--amber)':'var(--red)';
    h+='<div class="card" onclick="openAct('+j+','+repIdx+')" style="border-left-color:'+lc+'">';
    h+='<div class="card-top">';
    h+='<div><div class="card-name">'+act+'</div>';
    h+='<div class="card-meta"><b>\u5e97\u5bb6</b> '+stores.length+'&nbsp;&nbsp;<b>\u5408\u7d04</b> '+fmt(t.tc)+'</div></div>';
    h+='<div class="card-rate-big" style="color:'+lc+'">'+pct(t.rate)+'</div>';
    h+='</div>';
    h+=bar(t.rate);
    h+='</div>';
  });
  document.getElementById('p1').innerHTML=h;
}

// ── Page 2: Store list ────────────────────────────────────────────
function openAct(j,repIdx){
  curAct=j;
  var rep=repIdx!=null&&repIdx>=0?REPS[repIdx]:null;
  renderStoreList(actStores(j,rep),repIdx,j);
}

function renderStoreList(stores,repIdx,actIdx){

  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===2);});
  var sorted=stores.slice().sort(function(a,b){return b.contract-a.contract;});
  var rep=repIdx!=null&&repIdx>=0?REPS[repIdx]:null;
  var label=ACTS[actIdx]+(rep?' / '+rep:'');
  var h='<button class="back-btn" onclick="backToActs('+repIdx+')">\u8fd4\u56de\u6d3b\u52d5</button>';
  h+='<div class="pg-title">'+label+' \u5e97\u5bb6</div>';
  h+=sumBox(sorted,label);
  if(!sorted.length){h+='<div class="empty">\u7121\u8cc7\u6599</div>';}
  else{
    sorted.forEach(function(s,rank){
      var r=s.rate!=null?s.rate:(s.contract>0?s.actual/s.contract:0);
      var c=bc(r),lc=c==='g'?'var(--green)':c==='w'?'var(--amber)':'var(--red)';
      h+='<div class="scard" onclick="openStore('+rank+')">';
      h+='<div class="rank">'+(rank+1)+'</div>';
      h+='<div class="scard-body">';
      h+='<div class="scard-name">'+s.store+'</div>';
      h+='<div class="scard-sub">'+s.rep+chipHtml(r)+'</div>';
      h+=bar(r);
      h+='</div>';
      h+='<div class="scard-right">';
      h+='<div class="scard-amt">'+fmt(s.contract)+'</div>';
      h+='<div class="scard-rem" style="color:'+lc+'">'+pct(r)+'</div>';
      h+='</div>';
      h+='</div>';
    });
  }
  window.__storeList=sorted;
  window.__storeRepIdx=repIdx;
  window.__storeActIdx=actIdx;
  document.getElementById('p2').innerHTML=h;
}

// ── Page 3: Store detail ──────────────────────────────────────────
function openStore(rank){
  var s=window.__storeList[rank];
  var actIdx=window.__storeActIdx;
  var isBig=actIdx===2;
  var r=s.rate!=null?s.rate:(s.contract>0?s.actual/s.contract:0);
  var c=bc(r),lc=c==='g'?'var(--green)':c==='w'?'var(--amber)':'var(--red)';
  document.querySelectorAll('.nav button').forEach(function(b,i){b.classList.toggle('active',i===2);});
  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===3);});

  var h='<button class="back-btn" onclick="backToStores()">\u8fd4\u56de\u5e97\u5bb6</button>';
  h+='<div class="pg-title">'+ACTS[actIdx]+'</div>';
  // headline
  h+='<div style="margin-bottom:18px">';
  h+='<div style="font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px">'+s.store+'</div>';
  h+='<div style="font-size:13px;color:var(--tx2)">'+s.rep+chipHtml(r)+'</div>';
  h+='</div>';
  // big rate
  h+='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px;text-align:center">';
  h+='<div style="font-family:var(--mono);font-size:48px;font-weight:500;color:'+lc+';line-height:1">'+pct(r)+'</div>';
  h+='<div style="font-size:11px;color:var(--tx2);margin-top:6px;letter-spacing:.1em">\u9054\u6210\u7387</div>';
  h+='<div class="bar-track" style="margin-top:14px"><div class="bar-fill '+c+'" style="width:'+Math.min(100,r*100).toFixed(1)+'%"></div></div>';
  h+='</div>';
  // detail kv
  h+='<div class="det-box"><div class="det-title">\u5408\u7d04\u660e\u7d30</div>';
  if(isBig){
    h+='<div class="kv"><span class="kv-k">\u5408\u7d04\u6578\u91cf</span><span class="kv-v">'+s.contract_qty+'</span></div>';
    h+='<div class="kv"><span class="kv-k">\u5be6\u969b\u6578\u91cf</span><span class="kv-v">'+s.actual_qty+'</span></div>';
  }
  h+='<div class="kv"><span class="kv-k">\u5408\u7d04\u91d1\u984d</span><span class="kv-v">'+fmtFull(s.contract)+'</span></div>';
  h+='<div class="kv"><span class="kv-k">\u5be6\u969b\u9032\u8ca8</span><span class="kv-v">'+fmtFull(s.actual)+'</span></div>';
  h+='<div class="kv"><span class="kv-k">\u5c1a\u672a\u9054\u6a19</span><span class="kv-v" style="color:'+lc+'">'+fmtFull(Math.max(0,s.contract-s.actual))+'</span></div>';
  h+='</div>';
  document.getElementById('p3').innerHTML=h;
}

function backToReps(){
  curRep=-1;
  document.querySelectorAll('.nav button').forEach(function(b,i){b.classList.toggle('active',i===0);});
  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===0);});
  renderReps();
}
function backToActs(repIdx){
  document.querySelectorAll('.nav button').forEach(function(b,i){b.classList.toggle('active',i===1);});
  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===1);});
  renderActs(repIdx!=null&&repIdx>=0?repIdx:null);
}
function backToStores(){
  document.querySelectorAll('.nav button').forEach(function(b,i){b.classList.toggle('active',i===2);});
  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===2);});
  renderStoreList(window.__storeList,window.__storeRepIdx,window.__storeActIdx);
}

renderReps();
</script>
</body>
</html>

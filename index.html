// ── 金額月報 ─────────────────────────────────────────────────
var amMode='sal';
function amSwitch(m){
  amMode=m;
  document.getElementById('am_tb1').classList.toggle('active',m==='sal');
  document.getElementById('am_tb2').classList.toggle('active',m==='inv');
  amRender();
}
function skuNT(sku,qty){return Math.round((PRICE[sku]||0)*(qty||0));}
function amRender(){
  var tbl=document.getElementById('am_tbl');
  var months=D.m;
  var mi=Math.max(0,months.length-12);
  var mShow=months.slice(mi);
  var isInv=amMode==='inv';
  var src=isInv?DLMON_INV:DLMON_SAL;
  var fmt=function(v){return v>0?'NT$'+Math.round(v).toLocaleString():'-';};
  var colLabel=isInv?'期末庫存金額':'合計';
  var lastColIdx=mShow.length-1;
  var h='<thead><tr><th style="position:sticky;left:0;background:var(--sf);z-index:2;white-space:nowrap">經銷商</th>';
  mShow.forEach(function(m){h+='<th style="text-align:right;min-width:90px">'+m+'</th>';});
  h+='<th style="text-align:right;min-width:100px;font-weight:700">'+colLabel+'</th></tr></thead><tbody>';
  if(src&&src.length){
    var colTotals=mShow.map(function(){return 0;});
    var grandRowTot=0;
    src.forEach(function(row){
      var vals=mShow.map(function(_,j){return row.v[mi+j]||0;});
      var rowTot=isInv?vals[lastColIdx]:vals.reduce(function(a,v){return a+v;},0);
      grandRowTot+=rowTot;
      h+='<tr><td style="position:sticky;left:0;background:var(--sf);white-space:nowrap">'+row.d+'</td>';
      vals.forEach(function(v,j){colTotals[j]+=v;h+='<td style="text-align:right;'+(v>0?'':' color:var(--t3)')+'">'+fmt(v)+'</td>';});
      h+='<td style="text-align:right;font-weight:700">'+fmt(rowTot)+'</td></tr>';
    });
    h+='<tr style="font-weight:700;border-top:2px solid var(--bd)"><td style="position:sticky;left:0;background:var(--sf)">合計</td>';
    colTotals.forEach(function(v){h+='<td style="text-align:right">'+fmt(v)+'</td>';});
    var grandColTot=isInv?colTotals[lastColIdx]:grandRowTot;
    h+='<td style="text-align:right">'+fmt(grandColTot)+'</td></tr>';
  } else {
    var dealers=[...new Set(D.r.map(function(r){return r.d;}))].sort();
    var data={};
    dealers.forEach(function(d){
      data[d]=mShow.map(function(_,j){
        var idx=mi+j;
        return D.r.filter(function(r){return r.d===d;}).reduce(function(sum,r){
          var qty=isInv?(r.i[idx]||0):(r.l[idx]||0);
          return sum+skuNT(r.s,qty);
        },0);
      });
    });
    var totals=mShow.map(function(_,j){return dealers.reduce(function(s,d){return s+(data[d][j]||0);},0);});
    dealers.forEach(function(d){
      var rowTot=isInv?data[d][lastColIdx]:data[d].reduce(function(a,v){return a+v;},0);
      h+='<tr><td style="position:sticky;left:0;background:var(--sf);white-space:nowrap">'+d+'</td>';
      data[d].forEach(function(v){h+='<td style="text-align:right;'+(v>0?'':' color:var(--t3)')+'">'+fmt(v)+'</td>';});
      h+='<td style="text-align:right;font-weight:700">'+fmt(rowTot)+'</td></tr>';
    });
    h+='<tr style="font-weight:700;border-top:2px solid var(--bd)"><td style="position:sticky;left:0;background:var(--sf)">合計</td>';
    var grand=isInv?totals[lastColIdx]:totals.reduce(function(a,v){return a+v;},0);
    totals.forEach(function(v){h+='<td style="text-align:right">'+fmt(v)+'</td>';});
    h+='<td style="text-align:right">'+fmt(grand)+'</td></tr>';
  }
  tbl.innerHTML=h+'</tbody>';
}

<script>
function switchMain(w){
  var isI=w==='inv';
  document.getElementById('inv-section').classList.toggle('on',isI);
  document.getElementById('sal-section').classList.toggle('on',!isI);
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('on');});
  document.querySelector('.main-tab[data-s="'+w+'"]').classList.add('on');
  if(!isI&&!sInitDone){sInitDone=true;sInitSales();}
}
function iSubGo(i){
  ['i_p0','i_p1','i_p2','i_p3'].forEach(function(id,j){document.getElementById(id).classList.toggle('on',j===i);});
  document.querySelectorAll('#inv-sub-nav .sub-tab').forEach(function(t,j){t.classList.toggle('on',j===i);});
  if(i===1)iR2();if(i===2)iR3();if(i===3)amRender();
}
function sSubGo(i){
  ['s_p0','s_p1','s_p2'].forEach(function(id,j){document.getElementById(id).classList.toggle('on',j===i);});
  document.querySelectorAll('#sal-sub-nav .sub-tab').forEach(function(t,j){t.classList.toggle('on',j===i);});
  if(i===1)sUpdateStore();if(i===2)sUpdatePivot();

    var el=document.getElementById('s_s'+reg),sub=document.getElementById('s_sp'+reg);
    if(el)el.textContent='NT$ '+Math.round(amt).toLocaleString();
    if(sub)sub.textContent=pct+'% of total';
  });
  var label=sCurMonth==='YTD'?'YTD Total':String(sCurMonth)+' Total';
  document.getElementById('s_badge').textContent=label+': NT$ '+Math.round(total).toLocaleString();
  var regs=['北區','中區','南區'],ra=regs.map(function(r){return regTot[r]||0;});
  if(sDonut)sDonut.destroy();
  sDonut=new Chart(document.getElementById('s_donut'),{type:'doughnut',
    data:{labels:regs,datasets:[{data:ra,backgroundColor:['rgba(88,166,255,.75)','rgba(63,185,80,.75)','rgba(227,179,65,.75)'],borderWidth:2,borderColor:'#161b22'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:10.5}}},
        tooltip:{callbacks:{label:function(c){return c.label+': NT$ '+Math.round(c.raw).toLocaleString()+' ('+Math.round(c.raw/total*100)+'%)';}}}}}});
  if(sBarReg)sBarReg.destroy();
  sBarReg=new Chart(document.getElementById('s_barReg'),{type:'bar',
    data:{labels:regs,datasets:[{data:ra,backgroundColor:['rgba(88,166,255,.7)','rgba(63,185,80,.7)','rgba(227,179,65,.7)'],borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return 'NT$ '+Math.round(c.raw).toLocaleString();}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:12},color:'#b1bac4'}},
               y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:function(v){return v>=1000?Math.round(v/1000)+'k':v;}}}}}});
}
function sUpdateStore(){
  var data=sFiltered(),regF=document.getElementById('s_storeReg').value;
  if(regF)data=data.filter(function(r){return r[1]===regF;});
  var st={};data.forEach(function(r){st[r[3]]=(st[r[3]]||0)+r[4];});
  var topN=parseInt(document.getElementById('s_topN').value)||15;
  var sorted=Object.entries(st).sort(function(a,b){return b[1]-a[1];}).slice(0,topN);
  document.getElementById('s_storeWrap').style.height=Math.max(300,sorted.length*28+80)+'px';
  if(sStoreBar)sStoreBar.destroy();
  sStoreBar=new Chart(document.getElementById('s_storeBar'),{type:'bar',
    data:{labels:sorted.map(function(e){return e[0];}),datasets:[{data:sorted.map(function(e){return e[1];}),backgroundColor:'rgba(63,185,80,.7)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return 'NT$ '+Math.round(c.raw).toLocaleString();}}}},
      scales:{x:{grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:function(v){return v>=1000?Math.round(v/1000)+'k':v;}}},y:{grid:{display:false},ticks:{color:'#b1bac4',font:{size:10.5}}}}}});
}
function sSwitchPivot(mode){
  sPivotMode=mode;
  var skus=[...new Set(RAW.map(function(r){return r[2];}))]
    .sort(function(a,b){return a.localeCompare(b);});
  var regs=[...new Set(RAW.map(function(r){return r[1];}))]
    .filter(function(r){return r&&r!=='其他';}).sort();
  var ps=document.getElementById('s_pivotSel');ps.innerHTML='';
  var opts=mode==='product'?skus:regs;
  opts.forEach(function(o){ps.insertAdjacentHTML('beforeend','<option>'+o+'</option>');});
  sPivotSel=opts[0]||'';ps.value=sPivotSel;
  document.getElementById('s_tb1').classList.toggle('active',mode==='product');
  document.getElementById('s_tb2').classList.toggle('active',mode==='region');
  sUpdatePivot();
}
function sUpdatePivot(){
  sPivotSel=document.getElementById('s_pivotSel').value;
  var data=sFiltered(),groups={};
  if(sPivotMode==='product'){
    data.filter(function(r){return r[2]===sPivotSel;}).forEach(function(r){groups[r[1]]=(groups[r[1]]||0)+r[4];});
  }else{
    data.filter(function(r){return r[1]===sPivotSel;}).forEach(function(r){groups[r[2]]=(groups[r[2]]||0)+r[4];});
  }
  var sorted=Object.entries(groups).sort(function(a,b){return b[1]-a[1];});
  if(sPivotBar)sPivotBar.destroy();
  sPivotBar=new Chart(document.getElementById('s_pivotBar'),{type:'bar',
    data:{labels:sorted.map(function(e){return e[0];}),datasets:[{data:sorted.map(function(e){return e[1];}),backgroundColor:'rgba(88,166,255,.7)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return 'NT$ '+Math.round(c.raw).toLocaleString();}}}},
      scales:{x:{grid:{color:'#21262d'},ticks:{color:'#8b949e',callback:function(v){return v>=1000?Math.round(v/1000)+'k':v;}}},y:{grid:{display:false},ticks:{color:'#b1bac4',font:{size:10.5}}}}}});
}
iInit();

// ── 金額月報 ─────────────────────────────────────────────────
var amMode='sal', amView='chart', amLineChart=null;
var AM_COLORS=['#58a6ff','#3fb950','#f78166','#e3b341','#bc8cff','#39d353','#ffa657','#79c0ff','#ff7b72','#56d364','#d2a8ff','#ffa198'];

function amSwitch(m){
  amMode=m;
  document.getElementById('am_tb1').classList.toggle('active',m==='sal');
  document.getElementById('am_tb2').classList.toggle('active',m==='inv');
  amRender();
}
function amViewSwitch(v){
  amView=v;
  document.getElementById('am_vt').classList.toggle('active',v==='table');
  document.getElementById('am_vc').classList.toggle('active',v==='chart');
  document.getElementById('am_chart_wrap').style.display=v==='chart'?'':'none';
  document.getElementById('am_wrap').style.display=v==='table'?'':'none';
  amRender();
}
function skuNT(sku,qty){return Math.round((PRICE[sku]||0)*(qty||0));}

function _amGetData(){
  var months=D.m;
  var mi=Math.max(0,months.length-12);
  var mShow=months.slice(mi);
  var isInv=amMode==='inv';
  var src=isInv?DLMON_INV:DLMON_SAL;
  var rows=[];
  if(src&&src.length){
    src.forEach(function(row){
      rows.push({d:row.d, vals:mShow.map(function(_,j){return row.v[mi+j]||0;})});
    });
  } else {
    var dealers=[...new Set(D.r.map(function(r){return r.d;}))].sort();
    dealers.forEach(function(d){
      rows.push({d:d, vals:mShow.map(function(_,j){
        var idx=mi+j;
        return D.r.filter(function(r){return r.d===d;}).reduce(function(s,r){
          return s+skuNT(r.s,isInv?(r.i[idx]||0):(r.l[idx]||0));
        },0);
      })});
    });
  }
  // 去掉開頭所有經銷商都是0的月份
  var firstNonZero=0;
  for(var _j=0;_j<mShow.length;_j++){
    if(rows.some(function(r){return (r.vals[_j]||0)>0;})){firstNonZero=_j;break;}
    firstNonZero=_j+1;
  }
  if(firstNonZero>0){
    mShow=mShow.slice(firstNonZero);
    rows=rows.map(function(r){return {d:r.d,vals:r.vals.slice(firstNonZero)};});
  }
  return {mShow:mShow, rows:rows, isInv:isInv};
}

function amRender(){
  if(amView==='chart') _amRenderChart();
  else _amRenderTable();
}

function _amRenderChart(){
  var d=_amGetData();
  var mShow=d.mShow, rows=d.rows;
  if(amLineChart){amLineChart.destroy();amLineChart=null;}
  var datasets=rows.map(function(row,i){
    return {
      label:row.d,
      data:row.vals.map(function(v){return v>0?Math.round(v/1000):null;}),
      borderColor:AM_COLORS[i%AM_COLORS.length],
      backgroundColor:AM_COLORS[i%AM_COLORS.length]+'33',
      borderWidth:2.5,
      pointRadius:4,
      pointHoverRadius:6,
      tension:0.3,
      fill:false,
      spanGaps:false
    };
  });
  // Add total line
  var totals=mShow.map(function(_,j){return rows.reduce(function(s,r){return s+(r.vals[j]||0);},0);});
  datasets.unshift({
    label:'合計',
    data:totals.map(function(v){return Math.round(v/1000);}),
    borderColor:'#e6edf3',
    backgroundColor:'#e6edf344',
    borderWidth:3,
    borderDash:[6,3],
    pointRadius:5,
    pointHoverRadius:7,
    tension:0.3,
    fill:false,
    order:0
  });
  var label=d.isInv?'庫存金額 (千元)':'銷售金額 (千元)';
  amLineChart=new Chart(document.getElementById('am_chart'),{
    type:'line',
    data:{labels:mShow, datasets:datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{color:'#b1bac4',boxWidth:12,padding:16,font:{size:11}}},
        tooltip:{
          backgroundColor:'#1c2128',borderColor:'#30363d',borderWidth:1,
          titleColor:'#e6edf3',bodyColor:'#b1bac4',
          callbacks:{label:function(ctx){
            return ' '+ctx.dataset.label+': NT$'+(ctx.parsed.y*1000).toLocaleString();
          }}
        }
      },
      scales:{
        x:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:11}}},
        y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:11},
          callback:function(v){return 'NT$'+(v>=1000?(v/1000).toFixed(0)+'M':v+'K');}
        },title:{display:true,text:label,color:'#8b949e',font:{size:11}}}
      }
    }
  });
}

function _amRenderTable(){
  var d=_amGetData();
  var mShow=d.mShow, rows=d.rows, isInv=d.isInv;
  var lastIdx=mShow.length-1;
  var fmt=function(v){return v>0?'NT$'+Math.round(v).toLocaleString():'-';};
  var colLabel=isInv?'期末庫存金額':'合計';
  var h='<thead><tr><th style="position:sticky;left:0;background:var(--sf);z-index:2;white-space:nowrap">經銷商</th>';
  mShow.forEach(function(m){h+='<th style="text-align:right;min-width:90px">'+m+'</th>';});
  h+='<th style="text-align:right;min-width:100px;font-weight:700">'+colLabel+'</th></tr></thead><tbody>';
  var colTotals=mShow.map(function(){return 0;});
  var grandRowTot=0;
  rows.forEach(function(row){
    var rowTot=isInv?row.vals[lastIdx]:row.vals.reduce(function(a,v){return a+v;},0);
    grandRowTot+=rowTot;
    h+='<tr><td style="position:sticky;left:0;background:var(--sf);white-space:nowrap">'+row.d+'</td>';
    row.vals.forEach(function(v,j){colTotals[j]+=v;h+='<td style="text-align:right;'+(v>0?'':' color:var(--t3)')+'">'+fmt(v)+'</td>';});
    h+='<td style="text-align:right;font-weight:700">'+fmt(rowTot)+'</td></tr>';
  });
  h+='<tr style="font-weight:700;border-top:2px solid var(--bd)"><td style="position:sticky;left:0;background:var(--sf)">合計</td>';
  colTotals.forEach(function(v){h+='<td style="text-align:right">'+fmt(v)+'</td>';});
  var grandColTot=isInv?colTotals[lastIdx]:grandRowTot;
  h+='<td style="text-align:right">'+fmt(grandColTot)+'</td></tr>';
  document.getElementById('am_tbl').innerHTML=h+'</tbody>';
}

</script></body></html>

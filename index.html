.page{display:none;min-height:100vh}.page.active{display:block}

.sub{font-size:12px;color:#8b949e;margin-top:2px}
.wrap{padding:12px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s}
.card:hover{border-color:#58a6ff;background:#1a2332}
.scard{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s}
.scard:hover{border-color:#58a6ff;background:#1a2332}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.name{font-size:15px;font-weight:600}
.sname{font-size:14px;font-weight:600}

.bar{background:#21262d;border-radius:3px;height:6px;overflow:hidden;margin-bottom:6px}
.fill{height:100%;border-radius:3px}
.fg{background:#3fb950}.fy{background:#d29922}.fr{background:#f85149}.fb{background:#58a6ff}
.stats{display:flex;justify-content:space-between;font-size:11px;color:#8b949e}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.ts{background:#0d2d6e;color:#58a6ff;border:1px solid #1f4a9e;font-size:10px;padding:1px 6px;border-radius:6px}
.tf{background:#1a3d1a;color:#3fb950;border:1px solid #2a5c2a;font-size:10px;padding:1px 6px;border-radius:6px}
.tb{background:#3d1e00;color:#e67a1a;border:1px solid #5c3200;font-size:10px;padding:1px 6px;border-radius:6px}
.cnt{font-size:11px;color:#8b949e;background:#21262d;padding:2px 8px;border-radius:10px}
.rank{font-size:11px;color:#8b949e;min-width:18px}
.plan{font-size:11px;color:#8b949e;background:#21262d;padding:1px 6px;border-radius:8px;margin-left:6px}
.ds{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px}
.dt{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.dr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #21262d}
.dr:last-child{border-bottom:none}
.dl{font-size:13px;color:#8b949e}.dv{font-size:13px;color:#e6edf3;font-weight:600}
.mr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #21262d}
.mr:last-child{border-bottom:none}
.ml{font-size:12px;color:#8b949e;min-width:30px}
.mi{flex:1;margin-left:8px;font-size:12px;color:#e6edf3}
.ma{font-size:12px;color:#58a6ff;font-weight:600;min-width:70px;text-align:right}
.sum{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:14px}
.sumt{font-size:12px;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}

var curRepIdx=0,curActIdx=0;
var REPS=["Jerry","Emily","Eric","Jayden","Wei","Yi"];
var ACTS=["年特案","彈性年約","大口活動"];
var ACT_CLS=["ts","tf","tb"];
function go(n){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});document.getElementById("p"+n).classList.add("active");window.scrollTo(0,0)}
function fmt(n){return n==null?"-":Math.round(n).toLocaleString("zh-TW")}
function pct(r){return r==null?"-":(r*100).toFixed(1)+"%"}
function bc(r){return r>=1?"g":r>=0.6?"y":"r"}
function fc(r){return r>=1?"fb":r>=0.6?"fg":r>=0.3?"fy":"fr"}
function fw(r){return Math.min(r*100,100)+"%"}
function el(id){return document.getElementById(id)}

function repStats(rep){
  var tc=0,ta=0,cnt=[0,0,0];
  D.spec_stores.forEach(function(s){if(s.rep===rep){tc+=s.contract;ta+=s.actual;cnt[0]++}});
  D.flex_stores.forEach(function(s){if(s.rep===rep){tc+=s.contract;ta+=s.total;cnt[1]++}});
  D.big_mouth_stores.forEach(function(s){if(s.rep===rep){tc+=s.contract;ta+=s.actual;cnt[2]++}});
  return {tc:tc,ta:ta,rate:tc?ta/tc:0,cnt:cnt};
}
function grandTotal(){
  var tc=0,ta=0;
  D.spec_stores.forEach(function(s){tc+=s.contract;ta+=s.actual});
  D.flex_stores.forEach(function(s){tc+=s.contract;ta+=s.total});
  D.big_mouth_stores.forEach(function(s){tc+=s.contract;ta+=s.actual});
  return {tc:tc,ta:ta,rate:tc?ta/tc:0};
}
function actStores(repName,actIdx){
  if(actIdx===0) return D.spec_stores.filter(function(s){return s.rep===repName});
  if(actIdx===1) return D.flex_stores.filter(function(s){return s.rep===repName});
  return D.big_mouth_stores.filter(function(s){return s.rep===repName});
}
function actSum(stores,actIdx){
  var tc=0,ta=0;
  stores.forEach(function(s){tc+=s.contract;ta+=(actIdx===1?s.total:s.actual)});
  return {tc:tc,ta:ta,rate:tc?ta/tc:0};
}

function renderP1(){
  var g=grandTotal();
  var h='<div class="sum"><div class="sumt">全員總計</div>';
  h+='<div class="bar"><div class="fill '+fc(g.rate)+'" style="width:'+fw(g.rate)+'"></div></div>';
  h+='<div class="stats"><span>合約 $'+fmt(g.tc)+'</span><span style="color:#e6edf3;font-weight:600">'+pct(g.rate)+'</span><span>進貨 $'+fmt(g.ta)+'</span></div></div>';
  REPS.forEach(function(rep,i){
    var st=repStats(rep);
    h+='<div class="card" onclick="openRep('+i+')">';
    h+='<div class="row"><span class="name">'+rep+'</span><span class="badge '+bc(st.rate)+'">'+pct(st.rate)+'</span></div>';
    h+='<div class="bar"><div class="fill '+fc(st.rate)+'" style="width:'+fw(st.rate)+'"></div></div>';
    h+='<div class="stats"><span>合約 $'+fmt(st.tc)+'</span><span>進貨 $'+fmt(st.ta)+'</span></div>';
    var tags="";
    ACTS.forEach(function(a,j){if(st.cnt[j]>0)tags+='<span class="'+ACT_CLS[j]+'">'+a+" "+st.cnt[j]+"</span>"});
    h+='<div class="tags">'+tags+"</div></div>";
  });
  el("c1").innerHTML=h;
}

function openRep(i){
  curRepIdx=i;
  var rep=REPS[i];
  var st=repStats(rep);
  el("t2").textContent=rep+" 的活動";
  el("s2").textContent="點選活動查看店家列表";
  var h='<div class="sum"><div class="sumt">'+rep+" 合計</div>";
  h+='<div class="bar"><div class="fill '+fc(st.rate)+'" style="width:'+fw(st.rate)+'"></div></div>';
  h+='<div class="stats"><span>合約 $'+fmt(st.tc)+'</span><span style="color:#e6edf3;font-weight:600">'+pct(st.rate)+'</span><span>進貨 $'+fmt(st.ta)+'</span></div></div>';
  ACTS.forEach(function(act,j){
    var stores=actStores(rep,j);
    if(!stores.length) return;
    var as=actSum(stores,j);
    h+='<div class="card" onclick="openAct('+j+')">';
    h+='<div class="row"><span><span class="'+ACT_CLS[j]+'" style="margin-right:6px">'+act+'</span></span><span class="cnt">'+stores.length+" 家</span></div>";
    h+='<div class="bar"><div class="fill '+fc(as.rate)+'" style="width:'+fw(as.rate)+'"></div></div>';
    h+='<div class="stats"><span>合約 $'+fmt(as.tc)+'</span><span class="badge '+bc(as.rate)+'">'+pct(as.rate)+'</span><span>進貨 $'+fmt(as.ta)+'</span></div></div>';
  });
  el("c2").innerHTML=h;
  go(2);
}

function openAct(j){
  curActIdx=j;
  var rep=REPS[curRepIdx];
  var act=ACTS[j];
  el("t3").textContent=rep+" · "+act;
  el("s3").textContent="依合約金額排序 ↓";
  var stores=actStores(rep,j).map(function(s,idx){return{s:s,idx:idx}}).sort(function(a,b){return b.s.contract-a.s.contract});
  window._sl=stores.map(function(x){return x.s});
  var h="";
  if(!stores.length) h='<div style="text-align:center;padding:40px;color:#8b949e">此業務無此活動資料</div>';
  stores.forEach(function(x,rank){
    var s=x.s;
    var actual=j===1?s.total:s.actual;
    var extra=j===1?"方案"+s.plan+(s.result_q2?" Q2:"+s.result_q2:""):(j===2?s.item:"");
    h+='<div class="scard" onclick="openStore('+rank+')">';
    h+='<div class="row"><span class="rank">'+(rank+1)+'</span><span class="sname">'+s.store+'</span>';
    if(extra) h+='<span class="plan">'+extra+'</span>';
    h+='<span class="badge '+bc(s.rate)+'">'+pct(s.rate)+'</span></div>';
    h+='<div class="bar"><div class="fill '+fc(s.rate)+'" style="width:'+fw(s.rate)+'"></div></div>';
    h+='<div class="stats"><span>合約 $'+fmt(s.contract)+'</span><span>進貨 $'+fmt(actual)+'</span></div></div>';
  });
  el("c3").innerHTML=h;
  go(3);
}

function openStore(rank){
  var s=window._sl[rank];
  var j=curActIdx;
  var actual=j===1?s.total:s.actual;
  el("t4").textContent=s.store;
  el("s4").textContent=REPS[curRepIdx]+" · "+ACTS[j];
  var h='<div class="ds"><div class="dt">概況</div>';
  h+='<div class="bar" style="margin-bottom:8px"><div class="fill '+fc(s.rate)+'" style="width:'+fw(s.rate)+'"></div></div>';
  h+='<div class="dr"><span class="dl">合約金額</span><span class="dv">$'+fmt(s.contract)+'</span></div>';
  h+='<div class="dr"><span class="dl">已進貨金額</span><span class="dv">$'+fmt(actual)+'</span></div>';
  h+='<div class="dr"><span class="dl">達成率</span><span class="dv"><span class="badge '+bc(s.rate)+'">'+pct(s.rate)+'</span></span></div>';
  if(j===1){
    h+='<div class="dr"><span class="dl">方案</span><span class="dv">'+s.plan+'</span></div>';
    h+='<div class="dr"><span class="dl">Q1進貨</span><span class="dv">$'+fmt(s.q1)+'</span></div>';
    h+='<div class="dr"><span class="dl">Q2進貨</span><span class="dv">$'+fmt(s.q2)+'</span></div>';
    if(s.result_q1) h+='<div class="dr"><span class="dl">Q1結案</span><span class="dv">'+s.result_q1+'</span></div>';
    if(s.result_q2) h+='<div class="dr"><span class="dl">Q2結案</span><span class="dv">'+s.result_q2+'</span></div>';
  }
  if(j===2&&s.item) h+='<div class="dr"><span class="dl">品項</span><span class="dv">'+s.item+'</span></div>';
  h+="</div>";
  if(j===0){
    var monthly=D.store_monthly[s.store];
    if(monthly){
      h+='<div class="ds"><div class="dt">月度明細</div>';
      [10,11,12,1,2,3].forEach(function(m){
        var items=monthly[String(m)];
        if(!items||!items.length) return;
        var total=items.reduce(function(a,x){return a+x.amount},0);
        h+='<div class="mr"><span class="ml">'+m+'月</span><div class="mi">';
        items.forEach(function(it){h+=it.product+" × "+it.qty+"瓶<br>"});
        h+='</div><span class="ma">$'+fmt(total)+'</span></div>';
      });
      h+="</div>";
    }
  }
  el("c4").innerHTML=h;
  go(4);
}

renderP1();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>IMD 年約結案進度</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--sf:#161b22;--nav:#010409;
  --pri:#58a6ff;--grn:#3fb950;--amber:#e3b341;--red:#f85149;--purple:#bc8cff;
  --t1:#e6edf3;--t2:#b1bac4;--t3:#8b949e;--bd:#30363d;--bd2:#21262d;--r:12px
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter','Microsoft JhengHei',system-ui,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh}
.top-nav{background:var(--nav);height:52px;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:300;border-bottom:1px solid var(--bd);gap:8px}
.brand{color:rgba(255,255,255,.9);font-size:.92rem;font-weight:800;white-space:nowrap;flex-shrink:0}
.back-btn{background:rgba(255,255,255,.08);border:none;color:var(--t2);font-size:.78rem;font-weight:600;padding:6px 11px;border-radius:8px;cursor:pointer;display:none;align-items:center;gap:5px;font-family:inherit;white-space:nowrap;flex-shrink:0}
.back-btn.show{display:flex}
.breadcrumb{font-size:.7rem;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.page{display:none;padding:16px;max-width:620px;margin:0 auto;padding-bottom:32px}
.page.on{display:block}
.rep-grid{display:flex;flex-direction:column;gap:10px}
.rep-card{background:var(--sf);border-radius:var(--r);padding:16px;border:1px solid var(--bd);cursor:pointer;transition:background .12s,transform .1s}
.rep-card:active{transform:scale(.98);background:#1c2128}
.rep-header{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.rep-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;flex-shrink:0}
.rep-info{flex:1}
.rep-name{font-size:.98rem;font-weight:800}
.rep-stores{font-size:.68rem;color:var(--t3);margin-top:2px}
.rep-arrow{color:var(--t3);font-size:1.1rem}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.stat-box{background:var(--bd2);border-radius:8px;padding:9px 12px}
.stat-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:4px}
.stat-val{font-size:.92rem;font-weight:700}
.stat-sub{font-size:.6rem;color:var(--t3);margin-top:2px}
.prog-row{display:flex;flex-direction:column;gap:5px}
.prog-top{display:flex;justify-content:space-between;align-items:center}
.prog-name{font-size:.67rem;color:var(--t3);font-weight:600}
.prog-pct{font-size:.78rem;font-weight:800}
.prog-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.sec-tabs{display:flex;gap:5px;margin-bottom:12px;background:var(--bd2);padding:4px;border-radius:10px}
.sec-tab{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--t3);font-size:.7rem;font-weight:700;border-radius:7px;cursor:pointer;font-family:inherit;transition:.12s;text-align:center}
.sec-tab.on{background:var(--sf);color:var(--t1)}
.sum-card{background:var(--sf);border-radius:var(--r);padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px}
.sum-title{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.sum-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.sum-num-box{text-align:center}
.sum-num-val{font-size:1rem;font-weight:800}
.sum-num-label{font-size:.58rem;color:var(--t3);margin-top:2px}
.store-list{display:flex;flex-direction:column;gap:7px}
.store-item{background:var(--sf);border-radius:10px;padding:13px 14px;border:1px solid var(--bd);cursor:pointer;transition:background .12s,transform .1s}
.store-item:active{transform:scale(.98);background:#1c2128}
.store-item.no-click{cursor:default}
.store-item.no-click:active{transform:none;background:var(--sf)}
.s-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.s-name{font-size:.85rem;font-weight:700;flex:1;min-width:0}
.badge{font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.b-spec{background:rgba(88,166,255,.15);color:var(--pri)}
.b-flex{background:rgba(188,140,255,.15);color:var(--purple)}
.b-ok{background:rgba(63,185,80,.15);color:var(--grn)}
.b-no{background:rgba(248,81,73,.12);color:var(--red)}
.b-note{background:rgba(227,179,65,.12);color:var(--amber)}
.s-arrow{color:var(--t3);font-size:.85rem;flex-shrink:0}
.s-meta{font-size:.67rem;color:var(--t3);display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
.s-meta .hi{color:var(--t2);font-weight:600}
.pg-title{font-size:1.05rem;font-weight:800;margin-bottom:2px}
.pg-sub{font-size:.7rem;color:var(--t3);margin-bottom:14px}
.detail-card{background:var(--sf);border-radius:var(--r);padding:14px 16px;border:1px solid var(--bd);margin-bottom:10px}
.detail-title{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.flex-months{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.flex-month-row{display:grid;grid-template-columns:58px 1fr auto;align-items:center;gap:8px}
.flex-month-label{font-size:.68rem;font-weight:700;color:var(--t3);white-space:nowrap}
.flex-month-bar{height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.flex-month-fill{height:100%;border-radius:3px}
.flex-month-val{font-size:.68rem;font-weight:700;color:var(--t2);white-space:nowrap;text-align:right;min-width:78px}
.month-wrap{margin-bottom:7px}
.month-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bd2);border-radius:9px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s}
.month-hdr:active{background:var(--bd)}
.month-hdr-title{font-size:.82rem;font-weight:700;flex:1}
.month-hdr-right{text-align:right}
.month-total-amt{font-size:.78rem;font-weight:700;color:var(--grn)}
.month-total-qty{font-size:.62rem;color:var(--t3);margin-top:1px}
.month-toggle-icon{font-size:.7rem;color:var(--t3);width:14px;text-align:center;flex-shrink:0}
.month-body{display:none;background:var(--sf);border-radius:0 0 9px 9px;border:1px solid var(--bd);border-top:none;overflow:hidden}
.month-body.open{display:block}
.prod-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--bd2)}
.prod-row:last-child{border-bottom:none}
.prod-name{flex:1;font-size:.74rem;color:var(--t2)}
.prod-qty{font-size:.74rem;font-weight:700;color:var(--t3);min-width:46px;text-align:right;flex-shrink:0}
.prod-amt{font-size:.74rem;font-weight:700;color:var(--amber);min-width:78px;text-align:right;flex-shrink:0}
.empty-month{text-align:center;padding:14px;color:var(--t3);font-size:.72rem}
.no-detail-hint{background:rgba(88,166,255,.05);border:1px dashed rgba(88,166,255,.2);border-radius:9px;text-align:center;padding:14px 16px;color:var(--t3);font-size:.72rem;line-height:1.6}
.sec-header{font-size:.63rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px;padding-left:2px}
.empty-box{text-align:center;padding:32px 16px;color:var(--t3)}
.c-grn{color:var(--grn)}.c-amber{color:var(--amber)}.c-red{color:var(--red)}.c-pri{color:var(--pri)}
</style>
</head>
<body>
<div class="top-nav">
  <button class="back-btn" id="backBtn" onclick="goBack()">◀ 返回</button>
  <div class="brand" id="navBrand">🥃 IMD 結案</div>
  <div class="breadcrumb" id="navCrumb"></div>
</div>
<div class="page on" id="p-reps"><div class="rep-grid" id="repGrid"></div></div>
<div class="page" id="p-stores">

  <div class="pg-sub" id="s-sub"></div>

    <button class="sec-tab" id="tab-flex" onclick="setTab('flex')">彈性年約</button>
  </div>
  <div class="sum-card">
    <div class="sum-title">業務合計</div>
    <div class="sum-nums" id="s-sumNums"></div>
    <div class="prog-bar" style="height:7px"><div class="prog-fill" id="s-sumBar" style="height:7px;border-radius:4px"></div></div>
  </div>
  <div class="store-list" id="storeList"></div>
</div>
<div class="page" id="p-detail"><div id="detailWrap"></div></div>

const fmtM=n=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':Math.round(n).toString();
const fmtN=n=>new Intl.NumberFormat('zh-TW').format(Math.round(n));
const pctCol=p=>p>=1?'var(--pri)':p>=0.6?'var(--grn)':p>=0.3?'var(--amber)':'var(--red)';
const pctCls=p=>p>=1?'c-pri':p>=0.6?'c-grn':p>=0.3?'c-amber':'c-red';
const REPS=['Emily','Jerry','Eric','Jayden','Wei','Yi'];
const COLORS={Emily:'#f0883e',Jerry:'#58a6ff',Eric:'#3fb950',Jayden:'#bc8cff',Wei:'#e3b341',Yi:'#f85149'};
const INITIALS={Emily:'Em',Jerry:'Jr',Eric:'Ec',Jayden:'Jd',Wei:'We',Yi:'Yi'};
const MONTHS=[10,11,12,1,2,3];
const MLABEL={10:'10月',11:'11月',12:'12月',1:'1月',2:'2月',3:'3月'};
let curRep=null,curStore=null,curTab='all';
let hist=['reps'];

function repData(rep){
  const sp=D.spec_stores.filter(s=>s.rep===rep);
  const fl=D.flex_stores.filter(s=>s.rep===rep);
  const sc=sp.reduce((a,s)=>a+s.contract,0),sa=sp.reduce((a,s)=>a+s.actual,0);
  const fc=fl.reduce((a,s)=>a+s.contract,0),fa=fl.reduce((a,s)=>a+s.total,0);
  const tc=sc+fc,ta=sa+fa,rate=tc>0?ta/tc:0;
  return{sp,fl,sc,sa,fc,fa,tc,ta,rate};
}

function buildRepGrid(){
  const g=document.getElementById('repGrid');g.innerHTML='';
  REPS.forEach(rep=>{
    const d=repData(rep),col=COLORS[rep];
    const div=document.createElement('div');div.className='rep-card';div.onclick=()=>openRep(rep);
    div.innerHTML=`<div class="rep-header">
      <div class="rep-avatar" style="background:${col}22;color:${col}">${INITIALS[rep]}</div>
      <div class="rep-info"><div class="rep-name">${rep}</div><div class="rep-stores">年特案 ${d.sp.length} 家 ／ 彈性年約 ${d.fl.length} 家</div></div>
      <div class="rep-arrow">›</div></div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-label">合約總額</div><div class="stat-val">NT$${fmtM(d.tc)}</div><div class="stat-sub">${fmtN(d.tc)}</div></div>
        <div class="stat-box"><div class="stat-label">累計進貨</div><div class="stat-val" style="color:${col}">NT$${fmtM(d.ta)}</div><div class="stat-sub">${fmtN(d.ta)}</div></div>
      </div>
      <div class="prog-row">
        <div class="prog-top"><span class="prog-name">整體達成率</span><span class="prog-pct ${pctCls(d.rate)}">${(d.rate*100).toFixed(1)}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(d.rate,1)*100}%;background:${pctCol(d.rate)}"></div></div>
      </div>`;
    g.appendChild(div);
  });
}

function openRep(rep){
  curRep=rep;curTab='all';hist.push('stores');
  document.getElementById('navBrand').style.display='none';
  document.getElementById('navCrumb').textContent=rep+' 的店家';
  document.getElementById('backBtn').classList.add('show');
  const d=repData(rep);
  document.getElementById('s-title').textContent=rep;
  document.getElementById('s-sub').textContent=`年特案 ${d.sp.length} 家 ｜ 彈性年約 ${d.fl.length} 家`;
  renderSummary(d);
  ['all','spec','flex'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('on',t==='all'));
  renderStores();showPage('stores');
}

function renderSummary(d){
  const col=pctCol(d.rate);
  document.getElementById('s-sumNums').innerHTML=`
    <div class="sum-num-box"><div class="sum-num-val">NT$${fmtM(d.tc)}</div><div class="sum-num-label">合約總額</div></div>
    <div class="sum-num-box"><div class="sum-num-val" style="color:${col}">NT$${fmtM(d.ta)}</div><div class="sum-num-label">累計進貨</div></div>
    <div class="sum-num-box"><div class="sum-num-val ${pctCls(d.rate)}">${(d.rate*100).toFixed(1)}%</div><div class="sum-num-label">達成率</div></div>`;
  const bar=document.getElementById('s-sumBar');
  bar.style.width=Math.min(d.rate,1)*100+'%';bar.style.background=col;
}

function setTab(t){
  curTab=t;
  ['all','spec','flex'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('on',k===t));
  renderStores();
}

function renderStores(){
  const c=document.getElementById('storeList');c.innerHTML='';
  const d=repData(curRep);let items=[];
  if(curTab!=='flex'){
    d.sp.forEach(s=>{
      const actual=s.actual||0,rate=s.contract>0?actual/s.contract:0;
      const sheetKey=findSheet(s.store);
      items.push({...s,actual,rate,hasDetail:!!sheetKey,sheetKey,isFlex:false});
    });
  }
  if(curTab!=='spec'){
    d.fl.forEach(s=>{
      const rate=s.contract>0?s.total/s.contract:0;
      items.push({...s,actual:s.total,rate,hasDetail:true,isFlex:true});
    });
  }
  items.sort((a,b)=>b.rate-a.rate);
  if(!items.length){c.innerHTML='<div class="empty-box">📭 此分類無資料</div>';return;}
  const active=items.filter(s=>!s.closed);
  const closed=items.filter(s=>s.closed);
  const render=(arr,showSec,secLabel)=>{
    if(!arr.length)return;
    if(showSec){const h=document.createElement('div');h.className='sec-header';h.textContent=secLabel;c.appendChild(h);}
    arr.forEach(s=>{
      const div=document.createElement('div');
      div.className='store-item'+((!s.hasDetail&&!s.isFlex)?' no-click':'');
      div.onclick=()=>openStore(s);
      const noteH=s.note&&s.note!=='None'?`<span class="badge b-note">${s.note}</span>`:'';
      const q2H=s.isFlex&&s.result_q2?`<span class="badge ${s.result_q2==='可結'?'b-ok':'b-no'}">Q2 ${s.result_q2}</span>`:'';
      const q1H=s.isFlex&&s.result_q1&&!s.result_q2?`<span class="badge ${s.result_q1==='可結'?'b-ok':'b-no'}">Q1 ${s.result_q1}</span>`:'';
      const closedH=s.closed?'<span class="badge b-ok">已結案</span>':'';
      div.innerHTML=`
        <div class="s-header">
          <span class="s-name">${s.store}</span>${noteH}${closedH}
          <span class="badge ${s.isFlex?'b-flex':'b-spec'}">${s.isFlex?'彈性':'年特案'}</span>${q2H}${q1H}
        </div>
        <div class="prog-row">
          <div class="prog-top">
            <span class="prog-name">合約 NT$${fmtN(s.contract)}${s.isFlex?' ｜ '+s.plan:''}</span>
            <span class="prog-pct ${pctCls(s.rate)}">${(s.rate*100).toFixed(1)}%</span>
          </div>
          <div class="prog-bar" style="margin-bottom:5px"><div class="prog-fill" style="width:${Math.min(s.rate,1)*100}%;background:${pctCol(s.rate)}"></div></div>
        </div>
        <div class="s-meta"><span>進貨 <span class="hi">NT$${fmtN(s.actual)}</span></span><span>${s.isFlex?'Q1+Q2 累計':'FY26全年'}</span></div>`;
      c.appendChild(div);
    });
  };
  render(active,closed.length>0,'進行中');
  if(closed.length)render(closed,true,'已結案');
}

function findSheet(storeName){
  if(D.store_monthly[storeName])return storeName;
  for(const k of Object.keys(D.store_monthly)){
    const base=storeName.split('(')[0];
    if(k===base||storeName.startsWith(k)||k.startsWith(base))return k;
  }
  return null;
}

function openStore(s){
  curStore=s;hist.push('detail');
  document.getElementById('navCrumb').textContent=curRep+' › '+s.store;
  const w=document.getElementById('detailWrap');
  const rate=s.contract>0?s.actual/s.contract:0;
  let html=`<div class="pg-title">${s.store}</div>
    <div class="pg-sub">${s.isFlex?'彈性年約 ｜ 方案 '+s.plan:'客製年特案 ｜ FY26 全年度'}</div>
    <div class="detail-card">
      <div class="detail-title">合約進度</div>
      <div class="sum-nums" style="margin-bottom:10px">
        <div class="sum-num-box"><div class="sum-num-val">NT$${fmtM(s.contract)}</div><div class="sum-num-label">合約金額</div></div>
        <div class="sum-num-box"><div class="sum-num-val" style="color:${pctCol(rate)}">NT$${fmtM(s.actual)}</div><div class="sum-num-label">${s.isFlex?'Q1+Q2 累計':'實際進貨'}</div></div>
        <div class="sum-num-box"><div class="sum-num-val ${pctCls(rate)}">${(rate*100).toFixed(1)}%</div><div class="sum-num-label">達成率</div></div>
      </div>
      <div class="prog-bar" style="height:8px"><div class="prog-fill" style="width:${Math.min(rate,1)*100}%;background:${pctCol(rate)};height:8px;border-radius:4px"></div></div>`;
  if(s.isFlex){
    const q1res=s.result_q1,q2res=s.result_q2;
    if(q1res||q2res)html+=`<div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
      ${q1res?`<span class="badge ${q1res==='可結'?'b-ok':'b-no'}" style="font-size:.7rem;padding:3px 12px">Q1 ${q1res}</span>`:''}
      ${q2res?`<span class="badge ${q2res==='可結'?'b-ok':'b-no'}" style="font-size:.7rem;padding:3px 12px">Q2 ${q2res}</span>`:''}
    </div>`;
  }
  html+=`</div>`;
  if(s.isFlex){
    html+=`<div class="detail-card"><div class="detail-title">分季進貨明細</div><div class="flex-months">`;
    const months=[{label:'Q1 (10-12月)',val:s.q1,col:'var(--purple)'},{label:'Q2 (1-3月)',val:s.q2,col:'var(--pri)'}];
    const maxVal=Math.max(s.q1||0,s.q2||0,1);
    months.forEach(m=>{
      const hasVal=m.val!==null&&m.val!==undefined&&m.val>0;
      const pct=hasVal?Math.min((m.val/maxVal)*100,100):0;
      html+=`<div class="flex-month-row">
        <span class="flex-month-label">${m.label}</span>
        <div class="flex-month-bar"><div class="flex-month-fill" style="width:${pct}%;background:${m.col}"></div></div>
        <span class="flex-month-val">${hasVal?'NT$'+fmtN(m.val):'—'}</span>
      </div>`;
    });
    html+=`<div style="border-top:1px solid var(--bd);margin-top:4px;padding-top:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.68rem;color:var(--t3);font-weight:700">累計</span>
      <span style="font-size:.8rem;font-weight:800;color:var(--grn)">NT$${fmtN(s.total)}</span>
    </div></div></div>`;
  } else {
    const sheetKey=s.sheetKey||findSheet(s.store);
    if(sheetKey){
      const monthly=D.store_monthly[sheetKey];
      html+='<div class="sec-header">月份進貨明細 (年特案)</div>';
      MONTHS.forEach(m=>{
        const items=(monthly[String(m)]||[]);
        const mTotal=items.reduce((a,i)=>a+i.amount,0),mQty=items.reduce((a,i)=>a+i.qty,0);
        const hasData=items.length>0;
        html+=`<div class="month-wrap"><div class="month-hdr" onclick="toggleMonth(this)">
          <span class="month-hdr-title">${MLABEL[m]} ${m>=10?'2025':'2026'}</span>
          ${hasData?`<div class="month-hdr-right"><div class="month-total-amt">NT$${fmtN(mTotal)}</div><div class="month-total-qty">${mQty} 瓶</div></div>`:'<span style="font-size:.68rem;color:var(--t3)">無進貨</span>'}
          <span class="month-toggle-icon">${hasData?'▾':'▸'}</span>
        </div><div class="month-body${hasData?' open':''}">`;
        if(hasData)items.forEach(i=>{html+=`<div class="prod-row"><span class="prod-name">${i.product}</span><span class="prod-qty">${i.qty} 瓶</span><span class="prod-amt">NT$${fmtN(i.amount)}</span></div>`;});
        else html+='<div class="empty-month">本月無進貨記錄</div>';
        html+='</div></div>';
      });
      html+='<div style="text-align:center;padding:10px 0;color:var(--t3);font-size:.68rem">4月以後尚無進貨資料</div>';
    } else html+='<div class="no-detail-hint">📋 此合約無月份明細資料</div>';
  }
  w.innerHTML=html;showPage('detail');
}

function toggleMonth(hdr){
  const body=hdr.nextElementSibling,icon=hdr.querySelector('.month-toggle-icon');
  body.classList.toggle('open')?icon.textContent='▾':icon.textContent='▸';
}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById('p-'+id).classList.add('on');window.scrollTo(0,0);}
function goBack(){
  hist.pop();const prev=hist[hist.length-1];
  if(prev==='reps'){document.getElementById('backBtn').classList.remove('show');document.getElementById('navBrand').style.display='';document.getElementById('navCrumb').textContent='';curRep=null;curStore=null;showPage('reps');}
  else if(prev==='stores'){document.getElementById('navCrumb').textContent=curRep+' 的店家';curStore=null;renderStores();showPage('stores');}
}
buildRepGrid();
</script>
</body>
</html>
